<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cowork-ryg</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── FLOWTASK DESIGN SYSTEM ── */
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --card: #1c1c1c;
      --border: #272727;
      --border-light: #333333;
      --text: #efefef;
      --text-muted: #555555;
      --text-mid: #999999;
      --accent: #efefef;
      --accent-glow: rgba(239,239,239,0.10);
      --flow: #ffffff;
      --flow-glow: rgba(255,255,255,0.15);
      --flow-dim: rgba(255,255,255,0.07);
      --success: #4caf82;
      --danger: #e05252;
      --radius: 14px;
      --radius-sm: 9px;
    }
    body[data-theme="light"] {
      --bg: #e2e0dc;
      --surface: #eceae6;
      --card: #ffffff;
      --border: #d0ceca;
      --border-light: #c0beba;
      --text: #141414;
      --text-muted: #9a9892;
      --text-mid: #4a4845;
      --accent: #141414;
      --accent-glow: rgba(20,20,20,0.08);
      --flow: #141414;
      --flow-glow: rgba(20,20,20,0.18);
      --flow-dim: rgba(0,0,0,0.07);
      --success: #2f8b66;
      --danger: #c94040;
    }
    body[data-theme="miku"] {
      --bg: #FFF0F7;
      --surface: #f2fcfb;
      --card: #ffffff;
      --border: #99D5D0;
      --border-light: #BCE8E4;
      --text: #1A2B2A;
      --text-muted: #007871;
      --text-mid: #005D57;
      --accent: #E3007F;
      --accent-glow: rgba(227,0,127,0.14);
      --flow: #00C4B6;
      --flow-glow: rgba(0,196,182,0.30);
      --flow-dim: rgba(0,196,182,0.15);
      --success: #00a898;
      --danger: #d04b4b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
      scrollbar-width: none;
    }
    body::-webkit-scrollbar { display: none; }

    /* ── CENTERED HERO SECTION ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 40px 80px;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 400;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 40px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }

    /* ── FLEX GRID CARDS ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 660px;
      width: 100%;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.2s ease;
      opacity: 0;
      animation: fadeUp 0.5s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }

    .card:hover {
      background: var(--surface);
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }

    .card-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      color: var(--text);
      opacity: 0.85;
    }

    .card-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    /* Staggered animation delays untuk kartu */
    .card:nth-child(1)  { animation-delay: 0.1s; }
    .card:nth-child(2)  { animation-delay: 0.15s; }
    .card:nth-child(3)  { animation-delay: 0.2s; }
    .card:nth-child(4)  { animation-delay: 0.25s; }
    .card:nth-child(5)  { animation-delay: 0.3s; }
    .card:nth-child(6)  { animation-delay: 0.35s; }
    .card:nth-child(7)  { animation-delay: 0.4s; }
    .card:nth-child(8)  { animation-delay: 0.45s; }

    /* ── NAVBAR (bottom) ── */
    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    /* ── SETTINGS DROPDOWN ── */
    .settings-wrapper {
      position: relative;
    }

    .settings-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-mid);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .settings-btn:hover {
      border-color: var(--border-light);
      color: var(--text);
    }
    .settings-btn svg {
      width: 12px;
      height: 12px;
      transition: transform 0.2s ease;
    }
    .settings-btn.open svg {
      transform: rotate(180deg);
    }

    .dropdown {
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 110px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .dropdown.open {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .theme-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-mid);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.02em;
      text-align: left;
      width: 100%;
    }
    .theme-btn:hover {
      background: var(--surface);
      color: var(--text);
    }
    .theme-btn.active {
      background: var(--flow-dim);
      border-color: var(--border-light);
      color: var(--text);
    }

    .dropdown-sep {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    .dropdown-link {
      display: flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
    }

    .dropdown-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px 2px;
    }

    /* ── CLOCK ── */
    .nav-clock {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .clock-date, .clock-time {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .clock-divider {
      width: 1px;
      height: 14px;
      background: var(--border-light);
      flex-shrink: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      main { padding-left: 20px; padding-right: 20px; }
      nav { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body data-theme="dark">

  <main>
    <h1 id="dynamic-greeting">What should we focus on?</h1>

    <div class="grid" id="grid">
      <a class="card" href="https://rojaryg.github.io/lifecalendar-ryg/" target="_blank">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <rect x="7" y="14" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
        </svg>
        <span class="card-name">Long-term Calendar</span>
      </a>

      <a class="card" href="https://rojaryg.github.io/project-ryg" target="_blank">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7a2 2 0 0 1 2-2h3l2 2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <line x1="9" y1="14" x2="15" y2="14"/><line x1="12" y1="11" x2="12" y2="17"/>
        </svg>
        <span class="card-name">Project Calendar</span>
      </a>

      <a class="card" href="https://rojaryg.github.io/timelineryg/" target="_blank">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <circle cx="6" cy="12" r="2" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/>
          <circle cx="18" cy="12" r="2" fill="currentColor" stroke="none"/>
          <line x1="6" y1="12" x2="6" y2="7"/><line x1="12" y1="12" x2="12" y2="17"/><line x1="18" y1="12" x2="18" y2="7"/>
        </svg>
        <span class="card-name">Timeline</span>
      </a>

      <a class="card" href="https://rojaryg.github.io/flowtask-ryg/" target="_blank">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span class="card-name">FlowTask</span>
      </a>

      <a class="card" href="https://rojaryg.github.io/mindryg/" target="_blank">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <circle cx="3" cy="6" r="2"/><line x1="5" y1="6" x2="9" y2="11"/>
          <circle cx="21" cy="6" r="2"/><line x1="19" y1="6" x2="15" y2="11"/>
          <circle cx="3" cy="18" r="2"/><line x1="5" y1="18" x2="9" y2="13"/>
          <circle cx="21" cy="18" r="2"/><line x1="19" y1="18" x2="15" y2="13"/>
        </svg>
        <span class="card-name">Mindmap</span>
      </a>

      <a class="card" href="https://rojaryg.github.io/notebook-ryg/" target="_blank">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 6h4"/><path d="M2 10h4"/><path d="M2 14h4"/><path d="M2 18h4"/>
          <rect x="6" y="3" width="16" height="18" rx="2"/>
        </svg>
        <span class="card-name">Notebook</span>
      </a>

      <a class="card" href="https://rojaryg.github.io/walling-ryg/" target="_blank">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
          <line x1="9" y1="12" x2="21" y2="12"/>
        </svg>
        <span class="card-name">Walling</span>
      </a>

      <a class="card" href="https://github.com" target="_blank">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        <span class="card-name">GitHub</span>
      </a>
    </div>
  </main>

  <nav>
    <span class="nav-logo">cowork-ryg</span>

    <div class="nav-clock">
      <span class="clock-date" id="clock-date"></span>
      <div class="clock-divider"></div>
      <span class="clock-time" id="clock-time"></span>
    </div>

    <div class="settings-wrapper">
      <button class="settings-btn" id="settings-btn" onclick="toggleDropdown()">
        Settings
        <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="dropdown" id="dropdown">
        <span class="dropdown-label">Theme</span>
        <button class="theme-btn active" id="btn-dark" onclick="setTheme('dark', this)">Dark</button>
        <button class="theme-btn" id="btn-light" onclick="setTheme('light', this)">Light</button>
        <button class="theme-btn" id="btn-miku" onclick="setTheme('miku', this)">Miku</button>
        <div class="dropdown-sep"></div>
        <span class="dropdown-label">Links</span>
        <a class="theme-btn dropdown-link" href="https://github.com" target="_blank">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.942.359.31.678.921.678 1.856 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
          GitHub
        </a>
      </div>
    </div>
  </nav>

  <script>
    // ── FUNGSI SAPAAN ACAK ──
    const greetings = [
      "Your turn, Roja.",
      "Still here, Roja.",
      "Back again, Roja.",
      "Let's go, Roja.",
      "Ready when you are.",
      "What's next, Roja?"
    ];

    const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
    document.getElementById('dynamic-greeting').textContent = randomGreeting;

    // ── FUNGSI THEME SWITCHER ──
    function setTheme(theme, btn) {
      document.body.setAttribute('data-theme', theme);
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      closeDropdown();
    }

    // ── DROPDOWN TOGGLE ──
    const settingsBtn = document.getElementById('settings-btn');
    const dropdown = document.getElementById('dropdown');

    function toggleDropdown() {
      const isOpen = dropdown.classList.contains('open');
      isOpen ? closeDropdown() : openDropdown();
    }

    function openDropdown() {
      dropdown.classList.add('open');
      settingsBtn.classList.add('open');
    }

    function closeDropdown() {
      dropdown.classList.remove('open');
      settingsBtn.classList.remove('open');
    }

    // ── CLOCK ──
    function updateClock() {
      const now = new Date();
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      const dayName = days[now.getDay()];
      const date = now.getDate();
      const month = months[now.getMonth()];

      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;

      const offset = -now.getTimezoneOffset() / 60;
      const offsetStr = (offset >= 0 ? '+' : '') + offset;

      document.getElementById('clock-date').textContent = `${dayName}, ${date} ${month}`;
      document.getElementById('clock-time').textContent = `${hours}.${minutes} ${ampm} (${offsetStr})`;
    }

    updateClock();
    setInterval(updateClock, 1000);

    // Tutup dropdown kalau klik di luar
    document.addEventListener('click', function(e) {
      if (!settingsBtn.contains(e.target) && !dropdown.contains(e.target)) {
        closeDropdown();
      }
    });
  </script>

</body>
</html>
